services:
  max2tg:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      LOG_DIR: /app/logs
      RELAY_BIND_HOST: ${RELAY_BIND_HOST:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    ports:
      - "127.0.0.1:${RELAY_HOST_PORT:-${RELAY_BIND_PORT:-8080}}:${RELAY_BIND_PORT:-8080}"
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
